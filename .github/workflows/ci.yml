name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── JavaScript / TypeScript tests (Vitest) ──────────────────────────
  test-js:
    name: JS/TS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Root project (frontend dashboard JS)
      - name: Install root dependencies
        run: npm ci

      - name: Run root tests
        run: npm test

      # Dashboard (Lumina protocol TypeScript)
      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Run dashboard tests
        working-directory: dashboard
        run: npm test

  # ── Rust tests (cargo) ─────────────────────────────────────────────
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

  # ── Deploy entire Firebase project (only on push to main) ────────────
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: [test-js, test-rust]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify service account
        run: |
          SA_EMAIL=$(echo "$FIREBASE_SA" | jq -r '.client_email')
          echo "Project:         $FIREBASE_PROJECT_ID"
          echo "Service account: $SA_EMAIL"
          echo ""
          echo "Required IAM roles for this service account:"
          echo "  - roles/firebasehosting.admin"
          echo "  - roles/firebaserules.admin"
          echo "  - roles/clouddatastore.admin"
          echo "  - roles/serviceusage.serviceUsageConsumer"
          echo ""
          echo "Grant them at:"
          echo "  https://console.cloud.google.com/iam-admin/iam?project=$FIREBASE_PROJECT_ID"
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ fromJSON(secrets.FIREBASE_SERVICE_ACCOUNT).project_id }}

      - name: Deploy to Firebase
        run: |
          SA_FILE=$(mktemp --tmpdir firebase-sa-XXXXXX.json)
          trap 'rm -f "$SA_FILE"' EXIT
          echo "$FIREBASE_SA" > "$SA_FILE"
          chmod 600 "$SA_FILE"
          GOOGLE_APPLICATION_CREDENTIALS="$SA_FILE" \
            npx firebase-tools deploy \
              --only hosting,firestore,storage \
              --project "$FIREBASE_PROJECT_ID" --non-interactive
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ fromJSON(secrets.FIREBASE_SERVICE_ACCOUNT).project_id }}

      - name: Update env/version in Firestore
        run: |
          npm install --no-save firebase-admin@11
          node -e "
            const { initializeApp, cert } = require('firebase-admin/app');
            const { getFirestore } = require('firebase-admin/firestore');
            const pkg = require('./package.json');
            const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            initializeApp({ credential: cert(sa), projectId: sa.project_id });
            const db = getFirestore();
            db.doc('env/version').set({
              version: pkg.version,
              commitSha: '${{ github.sha }}',
              buildNumber: '${{ github.run_number }}',
              deployedAt: new Date().toISOString(),
            })
            .then(() => { console.log('env/version updated to ' + pkg.version); process.exit(0); })
            .catch(err => { console.error('Failed to update env/version in Firestore:', err); process.exit(1); });
          "
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
